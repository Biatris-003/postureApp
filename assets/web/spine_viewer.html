<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; overflow: hidden; }
    canvas { display: block; }
    #hint {
      position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
      color: rgba(120,120,120,0.55); font: 11px/1 sans-serif;
      pointer-events: none; letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
<div id="hint">Drag to rotate · Pinch to zoom</div>
<script src="three.min.js"></script>
<script>
// ── Scene setup ──────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
// Transparent — Flutter provides background via ColoredBox; setBackground()
// lets Flutter tint the scene to match the app theme at runtime.
scene.background = null;

const W = window.innerWidth, H = window.innerHeight;
const camera   = new THREE.PerspectiveCamera(42, W / H, 0.001, 20);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setClearColor(0x000000, 0);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(W, H);
document.body.appendChild(renderer.domElement);

window.setBackground = function(cssHex) {
  scene.background = new THREE.Color(cssHex);
};

// ── Lighting ─────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 0.55));
const sun = new THREE.DirectionalLight(0xffffff, 0.80);
sun.position.set(1, 2, 1.5);
scene.add(sun);
const fill = new THREE.DirectionalLight(0x8899ff, 0.30);
fill.position.set(-1, -0.5, -1);
scene.add(fill);
const back = new THREE.DirectionalLight(0xffaa66, 0.18);
back.position.set(0, -1, -2);
scene.add(back);

// ── Spine constants ──────────────────────────────────────────────────────────
const N       = 25;
const SENSORS = new Set([1, 6, 14, 18]); // L5, T12, T4, C7

function levelColor(i) {
  if (i <= 5)  return 0xe8784d;  // lumbar  – warm amber
  if (i <= 17) return 0x5b8fd9;  // thoracic – mid blue
  return 0x40b09a;               // cervical – teal
}

// ── Body skin mesh (semi-transparent, drawn first so spine shows through) ────
// renderOrder 0 → body behind everything.
// depthWrite false → body never occludes the spine discs.
//
// 5 cylinder regions + 1 sphere head.  All geometry created once; only
// position / quaternion / scale are updated per frame in updateSpine().
//
// Dimensions are in normalised spine-height units (full sacrum→C1 = ~1.0).
// rx = mediolateral half-width, rz = anteroposterior half-depth.
const _skinMat = new THREE.MeshLambertMaterial({
  color: 0xddb896,
  transparent: true,
  opacity: 0.24,
  depthWrite: false,
  side: THREE.DoubleSide,
});

// [fromVertIdx, toVertIdx, rx, rz]
const _skinCfg = [
  [0,  1,  0.098, 0.082],  // pelvis / sacrum
  [1,  6,  0.088, 0.076],  // lumbar
  [6,  14, 0.126, 0.092],  // thoracic (chest — widest)
  [14, 18, 0.138, 0.088],  // upper thoracic / shoulder girdle
  [18, 24, 0.042, 0.038],  // neck
];

// Unit cylinder (r=0.5, h=1) — scaled each frame via mesh.scale.
const _skinCylGeom = new THREE.CylinderGeometry(0.5, 0.5, 1, 12);
const _skinMeshes = _skinCfg.map(([fi, ti, rx, rz]) => {
  const mesh = new THREE.Mesh(_skinCylGeom, _skinMat.clone());
  mesh.renderOrder = 0;
  scene.add(mesh);
  return { mesh, fi, ti, rx, rz };
});

// Head sphere (unit sphere scaled per-frame).
const _headMesh = new THREE.Mesh(
  new THREE.SphereGeometry(1, 12, 10),
  _skinMat.clone()
);
_headMesh.renderOrder = 0;
scene.add(_headMesh);

// ── Vertebra disc meshes ─────────────────────────────────────────────────────
const discs = [];
for (let i = 0; i < N; i++) {
  const isSensor = SENSORS.has(i);
  const radius   = isSensor ? 0.024 : (i < 6 ? 0.020 : i < 18 ? 0.016 : 0.013);
  const height   = isSensor ? 0.010 : 0.006;
  const geom = new THREE.CylinderGeometry(radius, radius * 0.9, height, 20);
  const mat  = new THREE.MeshLambertMaterial({ color: levelColor(i) });
  const mesh = new THREE.Mesh(geom, mat);
  mesh.renderOrder = 1;
  scene.add(mesh);
  discs.push(mesh);

  if (isSensor) {
    // Ring indicator around sensor-level vertebrae.
    const rg   = new THREE.TorusGeometry(radius + 0.009, 0.0028, 8, 28);
    const rm   = new THREE.MeshLambertMaterial({
      color: 0xcccccc,
      emissive: new THREE.Color(0x444444),
    });
    const ring = new THREE.Mesh(rg, rm);
    ring.rotation.x = Math.PI / 2;
    ring.renderOrder = 1;
    mesh.add(ring);
  }
}

// ── Segment cylinders (vertebral bodies between discs) ───────────────────────
const segs = [];
for (let i = 0; i < N - 1; i++) {
  const r    = i < 6 ? 0.013 : i < 18 ? 0.010 : 0.008;
  const geom = new THREE.CylinderGeometry(r, r, 1, 10);
  const mat  = new THREE.MeshLambertMaterial({
    color: levelColor(i),
    transparent: true,
    opacity: 0.60,
  });
  const mesh = new THREE.Mesh(geom, mat);
  mesh.renderOrder = 1;
  scene.add(mesh);
  segs.push(mesh);
}

// ── Spinal cord centre-line ───────────────────────────────────────────────────
const linePos  = new Float32Array(N * 3);
const lineGeom = new THREE.BufferGeometry();
lineGeom.setAttribute('position', new THREE.BufferAttribute(linePos, 3));
// Mid-grey so it's readable on both light and dark backgrounds.
const lineMat = new THREE.LineBasicMaterial({
  color: 0x888888,
  transparent: true,
  opacity: 0.35,
});
const cordLine = new THREE.Line(lineGeom, lineMat);
cordLine.renderOrder = 2;
scene.add(cordLine);

// ── Touch orbit ──────────────────────────────────────────────────────────────
const target = new THREE.Vector3(0, 0.48, 0);
let theta  = 0.45;
let phi    = 1.28;
let radius = 0.90;
let pX = 0, pY = 0, pPinch = 0;

function moveCamera() {
  camera.position.set(
    target.x + radius * Math.sin(phi) * Math.sin(theta),
    target.y + radius * Math.cos(phi),
    target.z + radius * Math.sin(phi) * Math.cos(theta)
  );
  camera.lookAt(target);
}
moveCamera();

const el = renderer.domElement;
el.addEventListener('touchstart', e => {
  if (e.touches.length === 1) { pX = e.touches[0].clientX; pY = e.touches[0].clientY; }
  if (e.touches.length === 2) {
    pPinch = Math.hypot(e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY);
  }
}, { passive: true });

el.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1) {
    const dx = e.touches[0].clientX - pX;
    const dy = e.touches[0].clientY - pY;
    theta -= dx * 0.006;
    phi = Math.max(0.12, Math.min(Math.PI - 0.12, phi + dy * 0.006));
    pX = e.touches[0].clientX;
    pY = e.touches[0].clientY;
    moveCamera();
  } else if (e.touches.length === 2 && pPinch > 0) {
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX,
                         e.touches[0].clientY - e.touches[1].clientY);
    radius = Math.max(0.25, Math.min(2.2, radius * pPinch / d));
    pPinch = d;
    moveCamera();
  }
}, { passive: false });

// ── updateSpine — called from Flutter via runJavaScript ──────────────────────
// flat: [x0,y0,z0, ..., x24,y24,z24]
// SpinePoint3D axes: x=forward(anterior), y=up, z=right
// Three.js axes:     X=right,             Y=up, Z=toward-viewer
const _up  = new THREE.Vector3(0, 1, 0);
const _dir = new THREE.Vector3();
const _mid = new THREE.Vector3();
const _qa  = new THREE.Quaternion();

window.updateSpine = function(flat) {
  // 1. Position discs and fill linePos buffer.
  for (let i = 0; i < N; i++) {
    const sx = flat[i * 3];
    const sy = flat[i * 3 + 1];
    const sz = flat[i * 3 + 2];
    discs[i].position.set(sz, sy, -sx);
    linePos[i * 3]     = sz;
    linePos[i * 3 + 1] = sy;
    linePos[i * 3 + 2] = -sx;
  }
  lineGeom.attributes.position.needsUpdate = true;

  // 2. Orient inter-vertebral segment cylinders.
  for (let i = 0; i < N - 1; i++) {
    const ax = linePos[i*3],     ay = linePos[i*3+1],     az = linePos[i*3+2];
    const bx = linePos[(i+1)*3], by = linePos[(i+1)*3+1], bz = linePos[(i+1)*3+2];
    _mid.set((ax+bx)/2, (ay+by)/2, (az+bz)/2);
    _dir.set(bx-ax, by-ay, bz-az);
    const len = _dir.length();
    if (len < 1e-6) continue;
    _dir.normalize();
    _qa.setFromUnitVectors(_up, _dir);
    segs[i].position.copy(_mid);
    segs[i].quaternion.copy(_qa);
    segs[i].scale.y = len;
  }

  // 3. Orient body skin segments along the same line positions.
  //    Each cylinder uses scale.set(rx*2, segLen, rz*2) so rx/rz are
  //    the actual half-extents in world units (no extra factor needed).
  _skinMeshes.forEach(({ mesh, fi, ti, rx, rz }) => {
    const ax = linePos[fi*3],   ay = linePos[fi*3+1],   az = linePos[fi*3+2];
    const bx = linePos[ti*3],   by = linePos[ti*3+1],   bz = linePos[ti*3+2];
    _mid.set((ax+bx)/2, (ay+by)/2, (az+bz)/2);
    _dir.set(bx-ax, by-ay, bz-az);
    const len = _dir.length();
    if (len < 1e-6) return;
    _dir.normalize();
    _qa.setFromUnitVectors(_up, _dir);
    mesh.position.copy(_mid);
    mesh.quaternion.copy(_qa);
    // X = mediolateral width, Y = segment length, Z = anteroposterior depth.
    mesh.scale.set(rx * 2, len, rz * 2);
  });

  // 4. Head: sphere just above the C1 position (last vertex, index 24).
  const c1x = linePos[72], c1y = linePos[73], c1z = linePos[74];
  const HR = 0.068;
  _headMesh.position.set(c1x, c1y + HR * 1.15, c1z);
  // Slightly oval: a bit taller than wide, slightly flatter front-to-back.
  _headMesh.scale.set(HR, HR * 1.18, HR * 0.92);
};

// ── Render loop ──────────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
