<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111827; overflow: hidden; }
    canvas { display: block; }
    #hint {
      position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.28); font: 11px/1 sans-serif;
      pointer-events: none; letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
<div id="hint">Drag to rotate · Pinch to zoom</div>
<script src="three.min.js"></script>
<script>
// ── Scene setup ─────────────────────────────────────────────────────────────
const scene    = new THREE.Scene();
scene.background = new THREE.Color(0x111827);

const W = window.innerWidth, H = window.innerHeight;
const camera   = new THREE.PerspectiveCamera(42, W / H, 0.001, 20);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(W, H);
document.body.appendChild(renderer.domElement);

// ── Lighting ─────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 0.50));
const sun = new THREE.DirectionalLight(0xffffff, 0.85);
sun.position.set(1, 2, 1.5);
scene.add(sun);
const fill = new THREE.DirectionalLight(0x6688ff, 0.35);
fill.position.set(-1, -0.5, -1);
scene.add(fill);
const back = new THREE.DirectionalLight(0xff8844, 0.20);
back.position.set(0, -1, -2);
scene.add(back);

// ── Spine constants ──────────────────────────────────────────────────────────
const N       = 25;
const SENSORS = new Set([1, 6, 14, 18]); // L5, T12, T4, C7

function levelColor(i) {
  if (i <= 5)  return 0xe8784d;  // lumbar  – warm amber
  if (i <= 17) return 0x5b8fd9;  // thoracic – mid blue
  return 0x40b09a;               // cervical – teal
}

// ── Vertebra disc meshes ─────────────────────────────────────────────────────
const discs = [];
for (let i = 0; i < N; i++) {
  const isSensor = SENSORS.has(i);
  const radius   = isSensor ? 0.024 : (i < 6 ? 0.020 : i < 18 ? 0.016 : 0.013);
  const height   = isSensor ? 0.010 : 0.006;
  const geom = new THREE.CylinderGeometry(radius, radius * 0.9, height, 20);
  const mat  = new THREE.MeshLambertMaterial({ color: levelColor(i) });
  const mesh = new THREE.Mesh(geom, mat);
  scene.add(mesh);
  discs.push(mesh);

  if (isSensor) {
    // Glowing ring around sensor vertebra
    const rg  = new THREE.TorusGeometry(radius + 0.009, 0.0028, 8, 28);
    const rm  = new THREE.MeshLambertMaterial({ color: 0xffffff, emissive: new THREE.Color(0x555555) });
    const ring = new THREE.Mesh(rg, rm);
    ring.rotation.x = Math.PI / 2;  // lay flat in XZ plane
    mesh.add(ring);
  }
}

// ── Segment cylinders (vertebral bodies between discs) ───────────────────────
const segs = [];
for (let i = 0; i < N - 1; i++) {
  const r    = i < 6 ? 0.013 : i < 18 ? 0.010 : 0.008;
  const geom = new THREE.CylinderGeometry(r, r, 1, 10);
  const mat  = new THREE.MeshLambertMaterial({
    color: levelColor(i),
    transparent: true,
    opacity: 0.55,
  });
  const mesh = new THREE.Mesh(geom, mat);
  scene.add(mesh);
  segs.push(mesh);
}

// ── Spinal cord line ─────────────────────────────────────────────────────────
const linePos  = new Float32Array(N * 3);
const lineGeom = new THREE.BufferGeometry();
lineGeom.setAttribute('position', new THREE.BufferAttribute(linePos, 3));
const lineMat  = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.18 });
scene.add(new THREE.Line(lineGeom, lineMat));


// ── Touch orbit ──────────────────────────────────────────────────────────────
// Spherical coordinates around a fixed target (mid-thoracic, ≈ 0.5 up)
const target = new THREE.Vector3(0, 0.48, 0);
let theta  = 0.45;   // azimuthal  (side view offset slightly)
let phi    = 1.28;   // polar      (slightly from above)
let radius = 0.90;
let pX = 0, pY = 0, pPinch = 0;

function moveCamera() {
  camera.position.set(
    target.x + radius * Math.sin(phi) * Math.sin(theta),
    target.y + radius * Math.cos(phi),
    target.z + radius * Math.sin(phi) * Math.cos(theta)
  );
  camera.lookAt(target);
}
moveCamera();

const el = renderer.domElement;
el.addEventListener('touchstart', e => {
  if (e.touches.length === 1) { pX = e.touches[0].clientX; pY = e.touches[0].clientY; }
  if (e.touches.length === 2) {
    pPinch = Math.hypot(e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY);
  }
}, { passive: true });

el.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1) {
    const dx = e.touches[0].clientX - pX;
    const dy = e.touches[0].clientY - pY;
    theta -= dx * 0.006;
    phi = Math.max(0.12, Math.min(Math.PI - 0.12, phi + dy * 0.006));
    pX = e.touches[0].clientX;
    pY = e.touches[0].clientY;
    moveCamera();
  } else if (e.touches.length === 2 && pPinch > 0) {
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX,
                         e.touches[0].clientY - e.touches[1].clientY);
    radius = Math.max(0.25, Math.min(2.2, radius * pPinch / d));
    pPinch = d;
    moveCamera();
  }
}, { passive: false });

// ── updateSpine — called from Flutter via runJavaScript ───────────────────────
// flat: [x0,y0,z0, x1,y1,z1, ..., x24,y24,z24]
// SpinePoint3D axes: x=forward(anterior), y=up, z=right
// Three.js axes:     X=right,             Y=up, Z=toward-viewer
const _up  = new THREE.Vector3(0, 1, 0);
const _dir = new THREE.Vector3();
const _mid = new THREE.Vector3();
const _qa  = new THREE.Quaternion();

window.updateSpine = function(flat) {
  for (let i = 0; i < N; i++) {
    const sx = flat[i * 3];       // forward
    const sy = flat[i * 3 + 1];  // up
    const sz = flat[i * 3 + 2];  // right
    // Map to Three.js: forward→-Z, right→X, up→Y
    discs[i].position.set(sz, sy, -sx);
    linePos[i * 3]     = sz;
    linePos[i * 3 + 1] = sy;
    linePos[i * 3 + 2] = -sx;
  }
  lineGeom.attributes.position.needsUpdate = true;

  for (let i = 0; i < N - 1; i++) {
    const ax = linePos[i * 3],     ay = linePos[i * 3 + 1],     az = linePos[i * 3 + 2];
    const bx = linePos[(i+1)*3],   by = linePos[(i+1)*3+1],     bz = linePos[(i+1)*3+2];
    _mid.set((ax+bx)/2, (ay+by)/2, (az+bz)/2);
    _dir.set(bx-ax, by-ay, bz-az);
    const len = _dir.length();
    if (len < 1e-6) continue;
    _dir.normalize();
    _qa.setFromUnitVectors(_up, _dir);
    segs[i].position.copy(_mid);
    segs[i].quaternion.copy(_qa);
    segs[i].scale.y = len;
  }

};

// ── Render loop ──────────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
