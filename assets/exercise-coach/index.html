<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Exercise Coach</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="static/style.css" />
</head>
<body>

  <!-- SCREEN 1 — kept for JS compatibility only, never shown -->
  <div id="screen-select" class="screen" style="display:none !important;">
    <div class="exercise-grid" id="exercise-grid"></div>
    <div style="display:none">
      <div id="coach-title"></div>
      <div id="coach-subtitle"></div>
    </div>
  </div>

  <!-- SCREEN 2 — Coaching View (active immediately) -->
  <div id="screen-coach" class="screen active">
    <div class="coach-layout">

      <!-- Exercise title bar at the very top -->
      <div class="coach-title-bar">
        <span class="coach-title-text" id="coach-title-display">Loading…</span>
      </div>

      <!-- Camera + overlays -->
      <div class="video-wrap" id="video-wrap">
        <video id="video" playsinline autoplay muted></video>
        <canvas id="overlay"></canvas>

        <!-- Reps overlay — top right -->
        <div class="overlay-reps" id="overlay-reps">
          <div class="overlay-rep-number" id="rep-count">0</div>
          <div class="overlay-rep-label">REPS</div>
        </div>

        <!-- Joint angles overlay — top left -->
        <div class="overlay-angles" id="overlay-angles">
          <div id="angles-display"></div>
        </div>

        <div class="no-pose" id="no-pose">
          <span class="no-pose-icon">🧍</span>
          <span>Stand in frame to begin</span>
        </div>

        <!-- Hidden elements required by coach.js -->
        <div style="display:none">
          <div id="status-dot"></div>
          <div id="status-text"></div>
          <div id="phase-label"><span class="phase-badge start"></span></div>
          <div id="coach-title"></div>
          <div id="coach-subtitle"></div>
        </div>
      </div>

      <!-- Coaching feedback strip -->
      <div class="feedback-bar">
        <ul class="feedback-list" id="feedback-list">
          <li class="fb-neutral">Get into position to begin</li>
        </ul>
      </div>

    </div>
  </div>

  <script src="static/exercises.js"></script>
  <script src="static/coach.js"></script>
</body>
</html>
