<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Exercise Coach</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="static/style.css" />
</head>
<body>

  <!-- SCREEN 1 — Exercise Selection (kept for fallback/direct web use) -->
  <div id="screen-select" class="screen">
    <header class="select-header">
      <div class="brand">
        <span class="brand-name">Exercise Coach</span>
        <span class="brand-tag">AI Powered</span>
      </div>
      <span class="header-meta">MediaPipe · Real-time</span>
    </header>
    <div class="select-body">
      <p class="select-eyebrow">Select a movement</p>
      <h1 class="select-title">What are we<br>working on today?</h1>
      <p class="select-subtitle">Stand in frame and the AI will guide your form in real time.</p>
      <div class="exercise-grid" id="exercise-grid"></div>
    </div>
  </div>

  <!-- SCREEN 2 — Coaching View (camera-first, no top info bar) -->
  <div id="screen-coach" class="screen">
    <div class="coach-layout">

      <!-- Camera + overlays — full height -->
      <div class="video-wrap" id="video-wrap">
        <video id="video" playsinline autoplay muted></video>
        <canvas id="overlay"></canvas>

        <!-- Reps overlay — top right of camera -->
        <div class="overlay-reps" id="overlay-reps">
          <div class="overlay-rep-number" id="rep-count">0</div>
          <div class="overlay-rep-label">REPS</div>
        </div>

        <!-- Joint angles overlay — top left of camera -->
        <div class="overlay-angles" id="overlay-angles">
          <div id="angles-display"></div>
        </div>

        <div class="no-pose" id="no-pose">
          <span class="no-pose-icon">🧍</span>
          <span>Stand in frame to begin</span>
        </div>

        <!-- Status dot stays (used by coach.js) but hidden visually -->
        <div style="display:none">
          <div id="status-dot"></div>
          <div id="status-text"></div>
          <div id="phase-label"><span class="phase-badge start"></span></div>
          <div id="coach-title"></div>
          <div id="coach-subtitle"></div>
        </div>
      </div>

      <!-- Coaching feedback strip — compact, below camera -->
      <div class="feedback-bar">
        <ul class="feedback-list" id="feedback-list">
          <li class="fb-neutral">ℹ️ Get into position to begin</li>
        </ul>
      </div>

    </div>
  </div>

  <script src="static/exercises.js"></script>
  <script src="static/coach.js"></script>
</body>
</html>
